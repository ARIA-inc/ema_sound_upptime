rateLimitExceededIntro: 1時間あたりのリクエスト上限を超えました。再度このサイトにアクセスするにはしばらくお待ちください。もしくは、GitHubのPersonal Access Tokenを追加することで引き続きご利用いただけます。
rateLimitExceededWhatDoesErrorMean: このエラーは何を意味しますか？
rateLimitExceededErrorMeaning: このサイトは、ウェブサイトのリアルタイムなステータス情報を取得するためにGitHub APIを使用しています。デフォルトでは、GitHubは各IPアドレスごとに1時間あたり60リクエストまで許可していますが、その上限に達しました。
rateLimitExceededErrorHowCanFix: どのように解決できますか？
rateLimitExceededErrorFix: 1時間待つとIPアドレスの上限はリセットされます。もしくは、GitHubのPersonal Access Tokenを追加すると、1時間あたり5,000リクエストまで利用可能になります。
