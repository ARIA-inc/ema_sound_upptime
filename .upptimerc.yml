owner: ARIA-inc # Your GitHub organization or username, where this repository lives
repo: ema_sound_upptime # The name of this repository

sites:
  - name: ema_sound_web_prd
    url: https://station.e-ma-sound.com/
  - name: ema_sound_management_prd
    url: https://admin.e-ma-sound.com/
  - name: ema_sound_web_stg
    url: https://station-test.e-ma-sound.com/
  - name: ema_sound_management_stg
